<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영진전문대학교 - 포털 로그인</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-container">
        <!-- 좌측 브랜딩 패널 -->
        <div class="brand-panel">
            <div class="brand-overlay"></div>
            <div class="brand-content">
                <div class="logo-area">
                    <svg class="yju-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="4"/>
                        <path d="M30 35H70M50 35V65M40 65H60" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                        <circle cx="50" cy="50" r="25" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 2"/>
                    </svg>
                    <span class="logo-text">YJU</span>
                </div>
                <div class="welcome-text">
                    <h2>영진전문대학교</h2>
                    <p class="subtitle">Yeungjin University Portal</p>
                    <div class="divider"></div>
                    <p class="desc">창조적 지성과 바른 인성을 갖춘<br>글로벌 인재를 양성합니다.</p>
                </div>
                <div class="brand-footer">
                    <p>© 2026 Yeungjin University. All Rights Reserved.</p>
                </div>
            </div>
        </div>

        <!-- 우측 로그인 폼 패널 -->
        <div class="form-panel" style="display: flex; flex-direction: column; justify-content: center;">
            <div class="form-header">
                <h1>포털 로그인</h1>
                <p>아이디와 비밀번호를 입력하고 통합 포털 서비스를 이용하세요.</p>
            </div>

            <form id="loginForm" novalidate>
                <!-- 1. 아이디 입력 필드 -->
                <div class="input-group" id="userIdGroup">
                    <label for="userId">아이디</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </span>
                        <input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요" required>
                    </div>
                    <div class="validation-msg" id="userIdMsg">아이디를 입력해 주세요.</div>
                </div>

                <!-- 2. 비밀번호 입력 필드 -->
                <div class="input-group" id="passwordGroup">
                    <label for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </span>
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
                        <button type="button" class="pwd-toggle-btn" aria-label="비밀번호 보기/숨기기">
                            <svg class="eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                            <svg class="eye-on hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                    <div class="validation-msg" id="passwordMsg">비밀번호를 입력해 주세요.</div>
                </div>

                <!-- 아이디/비밀번호 찾기 링크 -->
                <div class="login-options" style="display: flex; justify-content: flex-end; margin-bottom: 20px; font-size: 13px;">
                    <a href="find-account.html" style="color: var(--text-secondary); text-decoration: none; transition: color var(--transition-fast);" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--text-secondary)'">아이디/비밀번호 찾기</a>
                </div>

                <!-- 로그인 오류 공통 메세지 -->
                <div class="validation-msg" id="loginGlobalMsg" style="margin-bottom: 20px; font-weight: 500; text-align: center;"></div>

                <!-- 제출 버튼 -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>로그인</span>
                    <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
                <div class="form-footer-text">
                    계정이 없으신가요? <a href="index.html">통합 회원가입</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase SDK 및 로그인 스크립트 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const userIdInput = document.getElementById('userId');
            const passwordInput = document.getElementById('password');
            const userIdGroup = document.getElementById('userIdGroup');
            const passwordGroup = document.getElementById('passwordGroup');
            const userIdMsg = document.getElementById('userIdMsg');
            const passwordMsg = document.getElementById('passwordMsg');
            const loginGlobalMsg = document.getElementById('loginGlobalMsg');
            const submitBtn = document.getElementById('submitBtn');
            const pwdToggleBtn = document.querySelector('.pwd-toggle-btn');
            const eyeOffIcon = document.querySelector('.eye-off');
            const eyeOnIcon = document.querySelector('.eye-on');

            // Supabase Client Initialization
            const { createClient } = window.supabase;
            const supabaseUrl = 'https://motmnnvwzxppuemgdbwl.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdG1ubnZ3enhwcHVlbWdkYndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjAwODksImV4cCI6MjA5ODQzNjA4OX0.BD04zk6zDyK5mBzGUvi7XfXX78GgzfZ9xkUorOGxkOw';
            const supabase = createClient(supabaseUrl, supabaseKey);

            // 비밀번호 토글 동작
            pwdToggleBtn.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                eyeOffIcon.classList.toggle('hidden', isPassword);
                eyeOnIcon.classList.toggle('hidden', !isPassword);
            });

            // 입력값 변경 시 에러 초기화
            userIdInput.addEventListener('input', () => {
                userIdGroup.classList.remove('error');
                userIdMsg.style.display = 'none';
                loginGlobalMsg.style.display = 'none';
            });
            passwordInput.addEventListener('input', () => {
                passwordGroup.classList.remove('error');
                passwordMsg.style.display = 'none';
                loginGlobalMsg.style.display = 'none';
            });

            // 로그인 제출 핸들러
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const userId = userIdInput.value.trim();
                const password = passwordInput.value;

                let hasError = false;

                if (!userId) {
                    userIdGroup.classList.add('error');
                    userIdMsg.style.display = 'flex';
                    hasError = true;
                }
                if (!password) {
                    passwordGroup.classList.add('error');
                    passwordMsg.style.display = 'flex';
                    hasError = true;
                }

                if (hasError) return;

                // 버튼 로딩 상태
                const originalText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span>로그인 중...</span>';
                loginGlobalMsg.style.display = 'none';

                try {
                    // Supabase member 테이블 조회
                    const { data, error } = await supabase
                        .from('member')
                        .select('*')
                        .eq('user_id', userId);

                    if (error) {
                        console.error('Supabase query error:', error);
                        loginGlobalMsg.textContent = '데이터베이스 연결 오류가 발생했습니다.';
                        loginGlobalMsg.style.display = 'flex';
                        return;
                    }

                    if (!data || data.length === 0) {
                        loginGlobalMsg.textContent = '존재하지 않는 아이디이거나 비밀번호가 다릅니다.';
                        loginGlobalMsg.style.display = 'flex';
                        userIdGroup.classList.add('error');
                        passwordGroup.classList.add('error');
                        return;
                    }

                    const dbUser = data[0];

                    // 비밀번호 비교 (현재 플레인 텍스트 매치)
                    if (dbUser.password !== password) {
                        loginGlobalMsg.textContent = '존재하지 않는 아이디이거나 비밀번호가 다릅니다.';
                        loginGlobalMsg.style.display = 'flex';
                        userIdGroup.classList.add('error');
                        passwordGroup.classList.add('error');
                        return;
                    }

                    // 로그인 성공! 세션 저장 후 welcome.html로 리다이렉트
                    const sessionUserData = {
                        num: dbUser.num,
                        userId: dbUser.user_id,
                        email: dbUser.email,
                        phone: dbUser.phone_number,
                        created_at: dbUser.created_at,
                        isLogin: true
                    };
                    sessionStorage.setItem('currentUser', JSON.stringify(sessionUserData));

                    window.location.href = 'welcome.html';

                } catch (err) {
                    console.error('Login processing error:', err);
                    loginGlobalMsg.textContent = '로그인 처리 중 오류가 발생했습니다.';
                    loginGlobalMsg.style.display = 'flex';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            });
        });
    </script>
</body>
</html>
