<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영진전문대학교 - 가입 완료</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="welcome-container">
        <!-- 축하 데코레이션 배경 효과 -->
        <div class="confetti-decor decor-1"></div>
        <div class="confetti-decor decor-2"></div>
        <div class="confetti-decor decor-3"></div>

        <div class="welcome-card">
            <!-- 탑 헤더 영역 (YJU 로고) -->
            <div class="welcome-logo">
                <svg class="yju-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="4"/>
                    <path d="M30 35H70M50 35V65M40 65H60" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="25" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 2"/>
                </svg>
                <span class="logo-text">YJU</span>
            </div>

            <!-- 축하 뱃지 및 타이틀 -->
            <div class="badge-success">WELCOME</div>
            <h1>회원가입이 완료되었습니다!</h1>
            <p class="welcome-subtitle">영진전문대학교 홈페이지 가입을 진심으로 축하합니다.</p>

            <!-- 등록된 유저 정보 상세 카드 -->
            <div class="user-details-card">
                <h3>등록 정보 (가입 완료)</h3>
                <div class="detail-row">
                    <span class="detail-label">고유 번호 (Number)</span>
                    <span class="detail-value highlight-num" id="welcomeNum">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">아이디 (ID)</span>
                    <span class="detail-value" id="welcomeId">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">이메일 (Email)</span>
                    <span class="detail-value" id="welcomeEmail">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">전화번호 (Phone)</span>
                    <span class="detail-value" id="welcomePhone">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">가입 일시</span>
                    <span class="detail-value" id="welcomeDate">-</span>
                </div>
            </div>

            <!-- 안내 메세지 -->
            <p class="welcome-guide">
                가입하신 아이디로 로그인하시면 대학 정보 서비스, 도서관 서비스 및 학사 정보 조회 등 영진전문대학교의 다양한 포털 혜택을 즉시 누리실 수 있습니다.
            </p>

            <!-- 버튼 동작 영역 -->
            <div class="welcome-actions">
                <a href="https://www.yju.ac.kr" class="action-btn primary-action" target="_blank" rel="noopener noreferrer">
                    <span>영진전문대 홈페이지 바로가기</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </a>
                <button type="button" class="action-btn secondary-action" id="backToSignupBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 12l6-6M3 12l6 6"/></svg>
                    <span>다시 회원가입하기</span>
                </button>
                <button type="button" class="action-btn danger-action" id="deleteAccountBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    <span>회원 탈퇴하기</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 스크립트 실행으로 데이터 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Session Storage 에서 가입 유저 정보 획득
            const rawUser = sessionStorage.getItem('currentUser');
            
            // 2. 비정상적인 접근 차단 (가입 정보가 없을 시 가입 화면으로 자동 리다이렉트)
            if (!rawUser) {
                alert('가입 정보가 없습니다. 회원가입을 먼저 진행해 주세요.');
                window.location.href = 'index.html';
                return;
            }

            const user = JSON.parse(rawUser);

            // Supabase Client Initialization
            const { createClient } = window.supabase;
            const supabaseUrl = 'https://motmnnvwzxppuemgdbwl.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdG1ubnZ3enhwcHVlbWdkYndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjAwODksImV4cCI6MjA5ODQzNjA4OX0.BD04zk6zDyK5mBzGUvi7XfXX78GgzfZ9xkUorOGxkOw';
            const supabase = createClient(supabaseUrl, supabaseKey);

            // 3. UI 바인딩
            if (user.isLogin) {
                document.querySelector('.badge-success').textContent = 'PORTAL LOGIN';
                document.querySelector('.welcome-card h1').textContent = '로그인에 성공했습니다!';
                document.querySelector('.welcome-subtitle').textContent = '영진전문대학교 포털 서비스에 정상 로그인되었습니다.';
                document.querySelector('.user-details-card h3').textContent = '로그인 회원 정보';
            } else {
                document.querySelector('.badge-success').textContent = 'WELCOME';
                document.querySelector('.welcome-card h1').textContent = '회원가입이 완료되었습니다!';
                document.querySelector('.welcome-subtitle').textContent = '영진전문대학교 홈페이지 가입을 진심으로 축하합니다.';
                document.querySelector('.user-details-card h3').textContent = '등록 정보 (가입 완료)';
            }

            document.getElementById('welcomeNum').textContent = `# ${user.num}`;
            document.getElementById('welcomeId').textContent = user.userId;
            document.getElementById('welcomeEmail').textContent = user.email;
            document.getElementById('welcomePhone').textContent = user.phone;

            // 가입 일시 포맷팅
            const signupDate = new Date(user.created_at);
            const formattedDate = signupDate.toLocaleString('ko-KR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('welcomeDate').textContent = formattedDate;

            // 4. 다시 가입하기 버튼 동작
            const backToSignupBtn = document.getElementById('backToSignupBtn');
            backToSignupBtn.addEventListener('click', () => {
                // 세션 스토리지 정보 비우고 복귀
                sessionStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            });

            // 5. 회원 탈퇴 버튼 동작
            const deleteAccountBtn = document.getElementById('deleteAccountBtn');
            deleteAccountBtn.addEventListener('click', async () => {
                const confirmed = confirm('정말로 영진전문대학교 포털 회원 탈퇴를 진행하시겠습니까?\n탈퇴 시 모든 정보가 복구 불가능하게 삭제됩니다.');
                if (!confirmed) return;

                // Show loading state
                const originalText = deleteAccountBtn.innerHTML;
                deleteAccountBtn.disabled = true;
                deleteAccountBtn.innerHTML = '<span>탈퇴 처리 중...</span>';

                try {
                    // Delete from main member table
                    const { error } = await supabase
                        .from('member')
                        .delete()
                        .eq('user_id', user.userId);

                    if (error) {
                        console.error('Delete member error:', error);
                    }

                    // Delete from fallback users table silently
                    await supabase
                        .from('users')
                        .delete()
                        .eq('user_id', user.userId);

                    alert('회원 탈퇴가 성공적으로 처리되었습니다. 이용해 주셔서 감사합니다.');
                    sessionStorage.removeItem('currentUser');
                    window.location.href = 'index.html';

                } catch (err) {
                    console.error('Delete account failed:', err);
                    alert('탈퇴 처리 중 오류가 발생했습니다.');
                } finally {
                    deleteAccountBtn.disabled = false;
                    deleteAccountBtn.innerHTML = originalText;
                }
            });
        });
    </script>
</body>
</html>
